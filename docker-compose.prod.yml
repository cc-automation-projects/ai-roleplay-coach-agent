services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ai-roleplay-coach-hub:latest
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-coach}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-coach_hub}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_HTTP_PORT=${QDRANT_HTTP_PORT:-6333}
      - VECTOR_SIZE=${VECTOR_SIZE:-1024}
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY:?JWT_SIGNING_KEY is required}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_MODEL=${LLM_MODEL:-mistral:7b-instruct}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://localhost:11434/v1}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coach_hub}
      POSTGRES_USER: ${POSTGRES_USER:-coach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coach} -d ${POSTGRES_DB:-coach_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e 'IO::Socket::INET->new(PeerHost=>\"127.0.0.1\",PeerPort=>6333)->print(\"GET /healthz HTTP/1.0\\r\\n\\r\\n\") or exit 1'"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
