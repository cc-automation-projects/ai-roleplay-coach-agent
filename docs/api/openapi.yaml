openapi: 3.1.0
info:
  title: AI Roleplay Coach Hub
  version: 0.1.0
paths:
  /api/v1/sessions:
    get:
      tags:
      - sessions
      summary: List Sessions
      description: Return paginated list of sessions for the current user.
      operationId: list_sessions_api_v1_sessions_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Page
      - name: size
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Size
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page_Session_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - sessions
      summary: Start Session
      description: Start a new simulation session for the authenticated user.
      operationId: start_session_api_v1_sessions_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sessions/{session_id}/turns:
    post:
      tags:
      - sessions
      summary: Process Turn
      description: Process an operator turn and get client response.
      operationId: process_turn_api_v1_sessions__session_id__turns_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Session Id
      - name: authorization
        in: header
        required: false
        schema:
