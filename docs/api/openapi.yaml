              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Login Api V1 Auth Login Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh
      description: Exchange a refresh token for a new token pair.
      operationId: refresh_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Refresh Api V1 Auth Refresh Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      description: Revoke a refresh token.
      operationId: logout_api_v1_auth_logout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Logout Api V1 Auth Logout Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - auth
      summary: Me
      description: Return current user info (requires valid Bearer token).
      operationId: me_api_v1_auth_me_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/users:
    get:
      tags:
      - auth
      summary: List Users
      description: Return paginated list of all users (admin only).
      operationId: list_users_api_v1_auth_users_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Page
      - name: size
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Size
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page_UserInfo_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/metrics:
    get:
      summary: Metrics
      description: Return Prometheus-formatted metrics (no auth for internal scraper).
      operationId: metrics_api_v1_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      summary: Health
      description: Health check endpoint — liveness probe.
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Health Get
  /ready:
    get:
      summary: Ready
      description: Readiness probe — all components are available.
      operationId: ready_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Ready Ready Get
components:
  schemas:
    DifficultyLevel:
      type: string
      enum:
      - beginner
      - intermediate
      - advanced
      - expert
      title: DifficultyLevel
      description: Difficulty level for the scenario.
    EvaluateRequest:
      properties:
        session_id:
          type: string
          format: uuid
          title: Session Id
      type: object
      required:
      - session_id
      title: EvaluateRequest
    EvaluateResponse:
      properties:
        session:
          $ref: '#/components/schemas/Session'
        evaluation:
          $ref: '#/components/schemas/Evaluation'
      type: object
      required:
      - session
      - evaluation
      title: EvaluateResponse
    Evaluation:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        tenant_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Tenant Id
        session_id:
          type: string
          format: uuid
          title: Session Id
        user_id:
          type: string
          format: uuid
          title: User Id
        overall_score:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Overall Score
        script_adherence:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Script Adherence
        tone_score:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Tone Score
        empathy_score:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Empathy Score
        objection_handling:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Objection Handling
        completeness_score:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Completeness Score
        praise_text:
          type: string
          title: Praise Text
          default: ''
        growth_text:
          type: string
          title: Growth Text
          default: ''
        closing_text:
          type: string
          title: Closing Text
          default: ''
        script_citations:
          items:
            type: string
          type: array
          title: Script Citations
        gaming_detected:
          type: boolean
          title: Gaming Detected
          default: false
        gaming_notes:
          type: string
          title: Gaming Notes
          default: ''
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - session_id
      - user_id
      - overall_score
      - script_adherence
      - tone_score
      - empathy_score
      - objection_handling
      - completeness_score
      title: Evaluation
      description: Post-session evaluation with feedback and score.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    LearningPlan:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        user_id:
          type: string
          format: uuid
          title: User Id
        scenario_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Scenario Id
        focus_areas:
          items:
            type: string
          type: array
          title: Focus Areas
        steps:
          items:
            $ref: '#/components/schemas/PlanStep'
          type: array
          title: Steps
        difficulty_label:
          type: string
          title: Difficulty Label
          default: beginner
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - user_id
      title: LearningPlan
      description: Personalised learning plan based on evaluation weaknesses.
    LearningPlanRequest:
      properties:
        scenario_id:
          type: string
          format: uuid
          title: Scenario Id
      type: object
      required:
      - scenario_id
      title: LearningPlanRequest
    LoginRequest:
      properties:
        username:
          type: string
          title: Username
        password:
          type: string
          title: Password
      type: object
      required:
      - username
      - password
      title: LoginRequest
    MicroQuiz:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        scenario_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Scenario Id
        title:
          type: string
          minLength: 1
          title: Title
        questions:
          items:
            $ref: '#/components/schemas/QuizQuestion'
          type: array
          title: Questions
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - title
      title: MicroQuiz
      description: A short quiz tied to a scenario for skill reinforcement.
    Page_Session_:
      properties:
        items:
          items: {}
          type: array
          title: Items
        total:
          type: integer
          title: Total
        page:
          type: integer
          title: Page
        size:
          type: integer
          title: Size
      type: object
      required:
      - items
      - total
      - page
      - size
      title: Page[Session]
    Page_UserInfo_:
      properties:
        items:
          items: {}
          type: array
          title: Items
        total:
          type: integer
          title: Total
        page:
          type: integer
          title: Page
        size:
          type: integer
          title: Size
      type: object
      required:
      - items
      - total
      - page
      - size
      title: Page[UserInfo]
    Page_dict_:
      properties:
        items:
          items: {}
          type: array
          title: Items
        total:
          type: integer
          title: Total
        page:
          type: integer
          title: Page
        size:
          type: integer
          title: Size
      type: object
      required:
      - items
      - total
      - page
      - size
      title: Page[dict]
    PlanStep:
      properties:
        order:
          type: integer
          minimum: 1.0
          title: Order
        title:
          type: string
          minLength: 1
          title: Title
        description:
          type: string
          minLength: 1
          title: Description
        estimated_minutes:
          type: integer
          minimum: 1.0
          title: Estimated Minutes
          default: 10
      type: object
      required:
      - order
      - title
      - description
      title: PlanStep
      description: A single actionable step in a learning plan.
    Psychotype:
      type: string
      enum:
      - aggressive
      - confused
      - technically_inept
      - fraudster
      - neutral
      title: Psychotype
      description: Client psychotype for the simulation.
    QuizQuestion:
      properties:
        question:
          type: string
          minLength: 1
          title: Question
        options:
          items:
            type: string
          type: array
          minItems: 2
          title: Options
        correct_index:
          type: integer
          minimum: 0.0
          title: Correct Index
        explanation:
          type: string
          title: Explanation
          default: ''
      type: object
      required:
      - question
      - options
      - correct_index
      title: QuizQuestion
      description: A single question in a micro-quiz.
    QuizRequest:
      properties:
        scenario_id:
          type: string
          format: uuid
          title: Scenario Id
        question_count:
          type: integer
          title: Question Count
          default: 5
      type: object
      required:
      - scenario_id
      title: QuizRequest
    QuizResponse:
      properties:
        quiz:
          $ref: '#/components/schemas/MicroQuiz'
      type: object
      required:
      - quiz
      title: QuizResponse
    RefreshRequest:
      properties:
        refresh_token:
          type: string
          title: Refresh Token
      type: object
      required:
      - refresh_token
      title: RefreshRequest
    RegisterRequest:
      properties:
        username:
          type: string
          maxLength: 32
          minLength: 3
          pattern: ^[a-zA-Z0-9_]+$
          title: Username
        password:
          type: string
          minLength: 8
          title: Password
      type: object
      required:
      - username
      - password
      title: RegisterRequest
    RespondRequest:
      properties:
        session_id:
          type: string
          format: uuid
          title: Session Id
      type: object
      required:
      - session_id
      title: RespondRequest
    RespondResponse:
      properties:
        client_message:
          type: string
          title: Client Message
      type: object
      required:
      - client_message
      title: RespondResponse
    Session:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        tenant_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Tenant Id
        user_id:
          type: string
          format: uuid
          title: User Id
        scenario_id:
          type: string
          format: uuid
          title: Scenario Id
        status:
          $ref: '#/components/schemas/SessionStatus'
          default: pending
        transcript:
          items:
            $ref: '#/components/schemas/TranscriptEntry'
          type: array
          title: Transcript
        started_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Started At
        completed_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Completed At
        difficulty_at_start:
          anyOf:
          - $ref: '#/components/schemas/DifficultyLevel'
          - type: 'null'
        psychotype_at_start:
          anyOf:
          - $ref: '#/components/schemas/Psychotype'
          - type: 'null'
        script_text_at_start:
          anyOf:
          - type: string
          - type: 'null'
          title: Script Text At Start
          description: Script text at session start — used to provide context to LLM
            simulator
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - user_id
      - scenario_id
      title: Session
      description: A single simulation session between operator and AI client.
    SessionStatus:
      type: string
      enum:
      - pending
      - in_progress
      - completed
      - interrupted
      - failed
      title: SessionStatus
      description: Status of a simulation session.
    StartDialogueRequest:
      properties:
        scenario_id:
          type: string
          format: uuid
          title: Scenario Id
      type: object
      required:
      - scenario_id
      title: StartDialogueRequest
    StartDialogueResponse:
      properties:
        greeting:
          type: string
          title: Greeting
        psychotype:
          $ref: '#/components/schemas/Psychotype'
      type: object
      required:
      - greeting
      - psychotype
      title: StartDialogueResponse
    StartSessionRequest:
      properties:
        scenario_id:
          type: string
          format: uuid
          title: Scenario Id
      type: object
      required:
      - scenario_id
      title: StartSessionRequest
      description: Request to start a new session (user_id comes from JWT).
    SyncLMSRequest:
      properties:
        plan_id:
          type: string
          format: uuid
          title: Plan Id
      type: object
      required:
      - plan_id
      title: SyncLMSRequest
    TranscriptEntry:
      properties:
        speaker:
          type: string
          enum:
          - operator
          - client
          title: Speaker
        text:
          type: string
          title: Text
          description: 'PII-sensitive: transcript text may contain personal data'
        timestamp:
          type: string
          format: date-time
          title: Timestamp
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      type: object
      required:
      - speaker
      - text
      title: TranscriptEntry
      description: A single turn in the session transcript.
    TurnRequest:
      properties:
        user_id:
          type: string
          format: uuid
          title: User Id
        message:
          type: string
          title: Message
      type: object
      required:
      - user_id
      - message
      title: TurnRequest
    UserInfo:
      properties:
        user_id:
          type: string
          title: User Id
        username:
          type: string
          title: Username
        role:
          type: string
          title: Role
        email:
          type: string
          title: Email
        is_active:
          type: boolean
          title: Is Active
      type: object
      required:
      - user_id
      - username
      - role
      - email
      - is_active
      title: UserInfo
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
