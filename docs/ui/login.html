<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход | AI Coach Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Глобальные переменные и стили из globals.css */
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --card-foreground: 222.2 84% 4.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 47.4% 11.2%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 47.4% 11.2%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
            --radius: 0.5rem;
        }
        * {
            border-color: hsl(var(--border));
        }
        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-feature-settings: "rlig" 1, "calt" 1;
        }
        .bg-background { background-color: hsl(var(--background)); }
        .bg-card { background-color: hsl(var(--card)); }
        .bg-primary { background-color: hsl(var(--primary)); }
        .bg-muted { background-color: hsl(var(--muted)); }
        .text-foreground { color: hsl(var(--foreground)); }
        .text-muted-foreground { color: hsl(var(--muted-foreground)); }
        .text-primary-foreground { color: hsl(var(--primary-foreground)); }
        .border-border { border-color: hsl(var(--border)); }
        .border-input { border-color: hsl(var(--input)); }
        .ring-offset-background { --tw-ring-offset-color: hsl(var(--background)); }
        .bg-card { background-color: hsl(var(--card)); }
        .text-card-foreground { color: hsl(var(--card-foreground)); }
        .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        /* Прочие утилиты для кнопок */
        .focus-visible\:outline-none:focus-visible { outline: 2px solid transparent; outline-offset: 2px; }
        .focus-visible\:ring-2:focus-visible { --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color); --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(2px + var(--tw-ring-offset-width)) var(--tw-ring-color); box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000); }
        .focus-visible\:ring-ring:focus-visible { --tw-ring-color: hsl(var(--ring)); }
        .focus-visible\:ring-offset-2:focus-visible { --tw-ring-offset-width: 2px; }
        .disabled\:pointer-events-none:disabled { pointer-events: none; }
        .disabled\:opacity-50:disabled { opacity: 0.5; }
        .hover\:bg-primary\/90:hover { background-color: hsl(var(--primary) / 0.9); }
        .hover\:underline:hover { text-decoration: underline; }
        .hover\:bg-accent:hover { background-color: hsl(var(--accent)); }
        .hover\:text-accent-foreground:hover { color: hsl(var(--accent-foreground)); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-muted/40 p-4">
    <div class="w-full max-w-md mx-auto">
        <div class="rounded-lg border bg-card text-card-foreground shadow-sm">
            <div class="flex flex-col space-y-1.5 p-6">
                <h2 class="text-2xl font-semibold leading-none tracking-tight">Вход в систему</h2>
                <p class="text-sm text-muted-foreground">Введите свои учётные данные для доступа к тренажёру</p>
            </div>
            <div class="p-6 pt-0">
                <form class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70" for="username">Логин</label>
                        <input class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50" id="username" placeholder="Введите логин" />
                        <!-- ошибка валидации (скрыта) -->
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70" for="password">Пароль</label>
                        <input class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50" id="password" type="password" placeholder="Введите пароль" />
                    </div>
                    <button class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 w-full" type="submit">Войти</button>
                    <div class="text-center text-sm text-muted-foreground">
                        Нет аккаунта? <a href="/register" class="text-primary hover:underline">Зарегистрироваться</a>
                    </div>
                </form>
                <!-- Дополнительно: забыли пароль? поддержка (из wireframe) -->
                <div class="text-center text-sm text-muted-foreground mt-4">
                    <a href="#" class="hover:underline">Забыли пароль?</a> | <a href="#" class="hover:underline">Поддержка</a>
                </div>
                <!-- Согласие 152-ФЗ (только текст) -->
                <div class="mt-6 text-xs text-muted-foreground text-center border-t pt-4">
                    ⚠️ 152-ФЗ: Нажимая кнопку, вы соглашаетесь на обработку ПДн и запись голосовых слепков в защищённом контуре.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
