services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./.build_state.json:/app/.build_state.json
      - ./pyproject.toml:/app/pyproject.toml
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=postgres
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - EMBEDDING_URL=http://embedding:8001/v1/embeddings
      - EMBEDDING_MODEL=intfloat/multilingual-e5-large
      - VECTOR_SIZE=${VECTOR_SIZE:-1024}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: coach_hub
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d coach_hub"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e 'IO::Socket::INET->new(PeerHost=>\"127.0.0.1\",PeerPort=>6333)->print(\"GET /healthz HTTP/1.0\\r\\n\\r\\n\") or exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  embedding:
    image: python:3.12-slim
    ports:
      - "8001:8001"
    environment:
      VECTOR_SIZE: ${VECTOR_SIZE:-1024}
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts
    command: >
      sh -c "pip install --quiet fastapi uvicorn && uvicorn scripts.embedding_mock:app --host 0.0.0.0 --port 8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_data:
  minio_data:
